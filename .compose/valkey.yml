services:
  valkey:
    image: valkey/valkey:${VALKEY_VERSION:-9}
    command: valkey-server --save 60 1 --loglevel warning
    ports:
      - ${VALKEY_PORT:-6379}:6379
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  valkey_data: