services:
  postgres:
    image: postgres:18-alpine
    env_file:
      - .env.compose
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DB:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 10

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    env_file:
      - .env.compose
    environment:
      IS_PERSISTENT: TRUE
    volumes:
      - chromadb_data:/chroma/chroma/
    ports:
      - "8000:8000"

  ollama:
    image: ollama/ollama:latest
    env_file:
      - .env.compose
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
      - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE:-q8_0}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  valkey:
    image: valkey/valkey:latest
    command: valkey-server --save 60 1 --loglevel warning
    env_file:
      - .env.compose
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    env_file:
      - .env.compose
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto_config/:/mosquitto/config/
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log

  mqtt-explorer:
    image: ghcr.io/thomasnordquist/mqtt-explorer:latest
    ports:
      - "3000:3000"
    environment:
      - MQTT_EXPLORER_USERNAME=admin
      - MQTT_EXPLORER_PASSWORD=password
      - PORT=3000
    volumes:
      - mqtt-explorer-data:/app/data

volumes:
  postgres_data:
  chromadb_data:
  ollama_data:
  valkey_data:
  mqtt_data:
  mqtt_log:
  mqtt-explorer-data:
