services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: waygate
      POSTGRES_USER: waygate
      POSTGRES_PASSWORD: waygate
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U waygate -d waygate" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:latest
    command: [ "valkey-server", "--appendonly", "yes", "--dir", "/data" ]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

volumes:
  postgres_data:
  valkey_data:
