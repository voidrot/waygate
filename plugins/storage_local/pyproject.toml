[project.entry-points."waygate.plugins.storage"]
waygate_storage_local = "waygate_plugin_local_storage.local_storage:LocalStorageProvider"

[build-system]
requires = ["uv_build>=0.11.3,<0.12.0"]
build-backend = "uv_build"
