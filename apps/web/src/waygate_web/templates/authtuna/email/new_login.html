<!doctype html>
<html lang="en">
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f3f1ea;
      font-family:
        Inter,
        Segoe UI,
        Arial,
        sans-serif;
      color: #1d232a;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 640px;
              background: #ffffff;
              border: 1px solid #d9d4c7;
              border-radius: 24px;
              overflow: hidden;
            "
          >
            <tr>
              <td
                style="
                  padding: 40px 40px 16px;
                  background: linear-gradient(135deg, #1d4ed8, #2563eb);
                  color: #eff6ff;
                "
              >
                <div
                  style="
                    font-size: 13px;
                    letter-spacing: 0.18em;
                    text-transform: uppercase;
                    font-weight: 700;
                  "
                >
                  WayGate
                </div>
                <h1 style="margin: 12px 0 0; font-size: 32px; line-height: 1.1">
                  New login detected
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px 40px 40px">
                <p style="margin: 0 0 20px; font-size: 16px; line-height: 1.7">
                  {{ username }}, your account just signed in successfully.
                </p>
                <table
                  role="presentation"
                  width="100%"
                  cellspacing="0"
                  cellpadding="0"
                  style="border-collapse: separate; border-spacing: 0 10px"
                >
                  <tr>
                    <td
                      style="
                        padding: 14px 16px;
                        background: #f8fafc;
                        border-radius: 14px;
                        font-size: 14px;
                      "
                    >
                      Region: {{ region }}
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="
                        padding: 14px 16px;
                        background: #f8fafc;
                        border-radius: 14px;
                        font-size: 14px;
                      "
                    >
                      IP address: {{ ip_address }}
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="
                        padding: 14px 16px;
                        background: #f8fafc;
                        border-radius: 14px;
                        font-size: 14px;
                      "
                    >
                      Device: {{ device }}
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="
                        padding: 14px 16px;
                        background: #f8fafc;
                        border-radius: 14px;
                        font-size: 14px;
                      "
                    >
                      Time: {{ login_time }}
                    </td>
                  </tr>
                </table>
                <p
                  style="
                    margin: 20px 0 0;
                    font-size: 13px;
                    line-height: 1.7;
                    color: #5b6470;
                  "
                >
                  If this was not you, reset your password and review your
                  active sessions immediately.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
