<!doctype html>
<html lang="en">
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f3f1ea;
      font-family:
        Inter,
        Segoe UI,
        Arial,
        sans-serif;
      color: #1d232a;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 640px;
              background: #ffffff;
              border: 1px solid #d9d4c7;
              border-radius: 24px;
              overflow: hidden;
            "
          >
            <tr>
              <td
                style="
                  padding: 40px 40px 16px;
                  background: linear-gradient(135deg, #0f766e, #164e63);
                  color: #f8fafc;
                "
              >
                <div
                  style="
                    font-size: 13px;
                    letter-spacing: 0.18em;
                    text-transform: uppercase;
                    font-weight: 700;
                  "
                >
                  WayGate
                </div>
                <h1 style="margin: 12px 0 0; font-size: 32px; line-height: 1.1">
                  Verify your email
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px 40px 40px">
                <p style="margin: 0 0 16px; font-size: 16px; line-height: 1.7">
                  Confirm this address to finish activating your WayGate
                  account.
                </p>
                <p style="margin: 0 0 28px">
                  <a
                    href="{{ verification_link }}"
                    style="
                      display: inline-block;
                      background: #0f766e;
                      color: #ffffff;
                      text-decoration: none;
                      padding: 14px 22px;
                      border-radius: 14px;
                      font-weight: 700;
                    "
                    >Verify email</a
                  >
                </p>
                <p
                  style="
                    margin: 0;
                    font-size: 13px;
                    line-height: 1.7;
                    color: #5b6470;
                  "
                >
                  If the button does not work, open this link directly:<br /><a
                    href="{{ verification_link }}"
                    style="color: #0f766e; word-break: break-all"
                    >{{ verification_link }}</a
                  >
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
