<!doctype html>
<html lang="en">
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f3f1ea;
      font-family:
        Inter,
        Segoe UI,
        Arial,
        sans-serif;
      color: #1d232a;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 640px;
              background: #ffffff;
              border: 1px solid #d9d4c7;
              border-radius: 24px;
              overflow: hidden;
            "
          >
            <tr>
              <td
                style="
                  padding: 40px 40px 16px;
                  background: linear-gradient(135deg, #0f766e, #14b8a6);
                  color: #f0fdfa;
                "
              >
                <div
                  style="
                    font-size: 13px;
                    letter-spacing: 0.18em;
                    text-transform: uppercase;
                    font-weight: 700;
                  "
                >
                  WayGate
                </div>
                <h1 style="margin: 12px 0 0; font-size: 32px; line-height: 1.1">
                  MFA enabled
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px 40px 40px">
                <p style="margin: 0; font-size: 16px; line-height: 1.7">
                  Multi-factor authentication is now active on your WayGate
                  account. Future sign-ins will require a second factor.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
