<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or "WayGate" }}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-base-200 text-base-content">
    <div class="navbar border-b border-base-300 bg-base-100 px-6 shadow-sm">
      <div class="navbar-start">
        <a class="btn btn-ghost text-lg font-semibold" href="/">WayGate</a>
      </div>
      <div class="navbar-end gap-2">
        <a class="btn btn-ghost btn-sm" href="/docs">API Docs</a>
        {% if user is defined and user %}
        <a class="btn btn-ghost btn-sm" href="/ui/dashboard">Account</a>
        <a class="btn btn-primary btn-sm" href="/auth/logout">Sign out</a>
        {% else %}
        <a class="btn btn-primary btn-sm" href="/auth/login">Sign in</a>
        {% endif %}
      </div>
    </div>
    <main class="mx-auto flex w-full max-w-6xl flex-col gap-6 px-6 py-10">
      {% block content %}{% endblock %}
    </main>
    {% block body_end %}{% endblock %}
  </body>
</html>
