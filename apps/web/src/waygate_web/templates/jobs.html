{% extends "operator_shell.html" %} {% block operator_content %}
<section class="card border border-base-300 bg-base-100 shadow-sm">
  <div class="card-body gap-4">
    <h2 class="card-title">Job filter contract</h2>
    <form class="grid gap-3 md:grid-cols-2 xl:grid-cols-5" method="get">
      <label class="floating-label">
        <input
          class="input input-bordered"
          name="workflow_type"
          value="{{ filters.workflow_type }}"
        />
        <span>Workflow type</span>
      </label>
      <label class="floating-label">
        <input
          class="input input-bordered"
          name="event_type"
          value="{{ filters.event_type }}"
        />
        <span>Event type</span>
      </label>
      <label class="floating-label">
        <input
          class="input input-bordered"
          name="status_filter"
          value="{{ filters.status }}"
        />
        <span>Status</span>
      </label>
      <label class="floating-label">
        <input
          class="input input-bordered"
          name="source_set_key"
          value="{{ filters.source_set_key }}"
        />
        <span>Source set key</span>
      </label>
      <label class="floating-label">
        <input
          class="input input-bordered"
          name="sort"
          value="{{ filters.sort }}"
        />
        <span>Sort</span>
      </label>
    </form>
  </div>
</section>

<section class="card border border-base-300 bg-base-100 shadow-sm">
  <div class="card-body gap-4">
    <h2 class="card-title">Workflow jobs stub</h2>
    <ul class="list gap-2">
      {% for job in stub_jobs %}
      <li class="list-row rounded-box bg-base-200 px-4 py-3">
        <div class="list-col-grow">
          <p class="font-semibold">{{ job.id }}</p>
          <p class="text-sm text-base-content/60">
            {{ job.workflow_type }} · {{ job.event_type }} · {{ job.status }}
          </p>
        </div>
        <div class="text-sm text-base-content/60">{{ job.source_set_key }}</div>
        <a class="btn btn-ghost btn-sm" href="/jobs/{{ job.id }}">Open</a>
      </li>
      {% endfor %}
    </ul>
  </div>
</section>
{% endblock %}
