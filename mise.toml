[tools]
node = "lts"
pnpm = "latest"
    python = "latest"
    ruff   = "latest"
    uv     = "latest"

[env]
    _.file        = '.env'
    _.python.venv = { path = '.venv', create = false }

[tasks."uv:sync"]
    run = "uv sync --all-groups --all-extras --all-packages"

[tasks.test]
    run = "uv run pytest"

[tasks."test:quick"]
    run = "uv run pytest -q"

[tasks."mcp:dev"]
    run = "uv run waygate-mcp-server --reload"

[tasks."maintenance:sweep"]
    run = "uv run waygate-maintenance-sweep"
