[tools]
prek   = "latest"
python = "3.14"
ruff   = "latest"
uv     = "latest"

[env]
_.file        = '.env'
_.python.venv = { path = '.venv', create = false }

[tasks."uv:sync"]
run = "uv sync --all-groups --all-extras --all-packages"

[tasks.test]
run = "uv run pytest"

[tasks."test:quick"]
run = "uv run pytest -q"

[tasks."docker:up"]
run = "docker compose up -d"

[tasks."docker:down"]
run = "docker compose down"

[tasks."docker:up:prod:nats"]
run = "docker compose -f compose.prod.yml --profile nats --profile chroma --profile ollama up -d"

[tasks."docker:up:prod:rq"]
run = "docker compose -f compose.prod.yml --profile rq --profile chroma --profile ollama up -d"

[tasks."docker:down:prod"]
run = "docker compose -f compose.prod.yml down"

[tasks."test:compose:nats-smoke"]
run = "uv run python scripts/compose_smoke_nats.py"

[tasks."ollama:pull"]
usage   = 'arg "<model>" help="Ollama model to pull"'
run     = "docker compose exec ollama ollama pull ${usage_model?}"
depends = "docker:up"

[tasks."format"]
run = "uv run ruff format ."

[tasks."lint"]
run = "uv run ruff check . --fix"
