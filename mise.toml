[tools]
    python = "latest"
    ruff   = "latest"
    uv     = "latest"

[env]
    _.file        = '.env'
    _.python.venv = { path = '.venv', create = false }

[tasks."uv:sync"]
    run = "uv sync --all-groups --all-extras --all-packages"

[tasks.test]
    run = "uv run pytest"

[tasks."test:quick"]
    run = "uv run pytest -q"
